spring:
  datasource:
    # allow overriding entire URL via DB_URL; default to in-memory H2 for quick startup
    url: ${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
  redis:
    host: localhost
    port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  # use an environment variable in production; default below is 32+ characters for HS256
  secret: ${JWT_SECRET:changeitchangeitchangeitchangeit}
  expiration-ms: 3600000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{X-Correlation-Id}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.ticketwave: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
